aid: kellanova
name: Kellanova
description: >-
  Kellanova is a global snacks-led consumer packaged foods company, formed in
  2023 from the spin-off of the Kellogg Company's snacks, international cereal
  and noodles, and North American frozen breakfast businesses. Kellanova owns
  and markets brands including Pringles, Cheez-It, Pop-Tarts, Eggo, RXBAR,
  MorningStar Farms, and Special K outside North America.
